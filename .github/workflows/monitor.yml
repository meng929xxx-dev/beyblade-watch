# 上傳到 GitHub 時，這個檔案的路徑必須是：.github/workflows/monitor.yml
name: Beyblade X Monitor

on:
  schedule:
    # GitHub 用 UTC 時間；台灣 08:00–24:00 = UTC 00:00–16:00，每 5 分鐘一次
    - cron: "*/5 0-15 * * *"
  workflow_dispatch: {}   # 允許手動執行（測試用）

permissions:
  contents: write         # 允許把更新後的商品清單存回倉庫

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: 執行監控
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python monitor.py

      - name: 儲存商品清單
        run: |
          git config user.name "beyblade-bot"
          git config user.email "bot@users.noreply.github.com"
          git add known_products.json || true
          git diff --cached --quiet || (git commit -m "更新商品清單" && git push)

# 上傳到 GitHub 時，這個檔案的路徑必須是：.github/workflows/monitor.yml
name: Beyblade X Monitor

on:
  schedule:
    # 備援用：GitHub cron 會大量丟棄觸發（實測一天只剩 2~3 次），不能依賴。
    # 正常運作靠「自我接力」：每棒結束前用 CHAIN_TOKEN 派發下一棒（API 派發不會被丟棄）。
    # cron 只負責「斷鏈後把鏈重新點燃」。選 7,37 分避開壅塞的整點/半點。
    - cron: "7,37 0-15 * * *"
  workflow_dispatch:      # 手動執行（測試用）
    inputs:
      test_mode:
        description: "測試模式：把架上商品（含預購）全部當成上架事件，發一次 LINE+Email 驗證通知鏈路"
        type: boolean
        default: false

permissions:
  contents: write         # 允許把商品清單狀態存回倉庫

concurrency:
  group: monitor
  cancel-in-progress: false   # 同時只跑一棒，多的觸發自動丟棄 → 不會重複通知

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: 執行監控（長跑 35 分鐘）
        env:
          LOOP_MINUTES: ${{ inputs.test_mode == true && '0' || '35' }}
          TEST_MODE: ${{ inputs.test_mode == true && '1' || '' }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python monitor.py

      - name: 儲存商品清單狀態
        if: always()
        run: |
          git config user.name "beyblade-bot"
          git config user.email "bot@users.noreply.github.com"
          git add known_products.json listed_state.json || true
          if ! git diff --cached --quiet; then
            git commit -m "更新商品狀態"
            git push || (git pull --rebase && git push) || echo "⚠️ 狀態推送失敗，下一棒可能重複通知一次"
          fi

      - name: 自我接力：派發下一棒
        if: ${{ always() && inputs.test_mode != true }}
        env:
          CHAIN_TOKEN: ${{ secrets.CHAIN_TOKEN }}
        run: |
          # 24 小時自我接力，不依賴不可靠的 cron；要停用整條鏈：Actions → Disable workflow
          if [ -z "$CHAIN_TOKEN" ]; then
            echo "⚠️ 未設定 CHAIN_TOKEN secret，無法自我接力，只能靠不可靠的 cron 備援！"
            exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $CHAIN_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/monitor.yml/dispatches" \
            -d '{"ref":"main"}')
          echo "派發下一棒 HTTP $code"

# 上傳到 GitHub 時，這個檔案的路徑必須是：.github/workflows/monitor.yml
name: Beyblade X Monitor

on:
  schedule:
    # GitHub 用 UTC；台灣 08:00–24:00 = UTC 00:00–16:00
    # 每 30 分鐘啟動一棒，每棒連續跑 35 分鐘（衝刺邏輯在 monitor.py 內）→ 接力覆蓋全天
    - cron: "*/30 0-15 * * *"
  workflow_dispatch:      # 手動執行（測試用）
    inputs:
      test_mode:
        description: "測試模式：把架上商品（含預購）全部當成上架事件，發一次 LINE+Email 驗證通知鏈路"
        type: boolean
        default: false

permissions:
  contents: write         # 允許把商品清單狀態存回倉庫

concurrency:
  group: monitor
  cancel-in-progress: false   # 新的一棒排隊等舊的跑完，無縫接力

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: 執行監控（長跑 35 分鐘）
        env:
          LOOP_MINUTES: ${{ inputs.test_mode == true && '0' || '35' }}
          TEST_MODE: ${{ inputs.test_mode == true && '1' || '' }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python monitor.py

      - name: 儲存商品清單狀態
        if: always()
        run: |
          git config user.name "beyblade-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase || true
          git add known_products.json listed_state.json || true
          git diff --cached --quiet || (git commit -m "更新商品狀態" && git push)
